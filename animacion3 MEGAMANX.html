<html>
<head>

    <title>ANIMACION 3 DIAGONAL MEGAMANX CSS</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background-color: black;
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: black;
            position: absolute;
            left: -100px;
            top: -100px;
            animation: cuadrito 3s infinite linear;
        }

        @keyframes cuadrito{
            from{
                left: -100px;
                top: -100px;
            }
            to{
                left: 500px;
                top: 200px;
            }
        }
        .cuadrito img{
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cuadrito">
            <img src="img/megamanx.gif" alt="">
        </div>
    </div>
</body>
</html>
